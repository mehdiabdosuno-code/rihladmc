services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rihla
      POSTGRES_USER: rihla
      POSTGRES_PASSWORD: rihla_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ── PostgreSQL performance tuning ────────────────────────────
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c max_connections=100
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c default_statistics_target=200
        -c log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rihla"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # ── Redis performance tuning ─────────────────────────────────
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --tcp-backlog 511
        --hz 10
        --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://rihla:rihla_secret@postgres:5432/rihla
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ── Uvicorn with uvloop for 2-4x faster async I/O ────────────
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --loop uvloop
        --http httptools
        --access-log
        --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
      VITE_WS_URL: ws://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
